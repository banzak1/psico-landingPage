<section id="faq" class="section faq-section">
  <div class="container faq-container">
    <div class="faq-header text-center">
      <h2 class="section-title">Dúvidas Frequentes</h2>
      <p class="section-subtitle">Tire suas principais dúvidas sobre o acompanhamento psicológico.</p>
    </div>
    
    <div class="faq-list">
      @for (faq of faqs; track $index) {
        <div class="faq-item" [class.open]="faq.isOpen" (click)="toggleFaq($index)" tabindex="0" (keydown.enter)="toggleFaq($index)">
          <div class="faq-question">
            <h3>{{ faq.question }}</h3>
            <span class="faq-icon">
              @if (!faq.isOpen) {
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
              } @else {
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line></svg>
              }
            </span>
          </div>
          <div class="faq-answer">
            <p>{{ faq.answer }}</p>
          </div>
        </div>
      }
    </div>
  </div>
</section>
